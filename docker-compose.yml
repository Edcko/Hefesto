# Hefesto OpenCode Testing Environment
# Docker Compose configuration for multi-distro E2E testing

services:
  # ─── Ubuntu (original test environment) ──────────────────────────────
  hefesto-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: hefesto-test
    volumes:
      # Mount test workspace for persistence
      - ./test-workspace:/workspace
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - NO_COLOR=0
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ─── Debian ──────────────────────────────────────────────────────────
  hefesto-debian:
    build:
      context: .
      dockerfile: Dockerfile.debian
    container_name: hefesto-debian
    volumes:
      - ./test-workspace-debian:/workspace
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - NO_COLOR=0
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ─── Fedora ──────────────────────────────────────────────────────────
  hefesto-fedora:
    build:
      context: .
      dockerfile: Dockerfile.fedora
    container_name: hefesto-fedora
    volumes:
      - ./test-workspace-fedora:/workspace
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - NO_COLOR=0
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ─── Alpine ──────────────────────────────────────────────────────────
  hefesto-alpine:
    build:
      context: .
      dockerfile: Dockerfile.alpine
    container_name: hefesto-alpine
    volumes:
      - ./test-workspace-alpine:/workspace
    stdin_open: true
    tty: true
    environment:
      - TERM=xterm-256color
      - NO_COLOR=0
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
