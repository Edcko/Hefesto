# Hefesto OpenCode Testing Environment
# Docker Compose configuration for isolated testing

services:
  hefesto-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: hefesto-test
    volumes:
      # Mount test workspace for persistence
      - ./test-workspace:/workspace
    stdin_open: true
    tty: true
    # Environment variables for testing
    environment:
      - TERM=xterm-256color
      - NO_COLOR=0
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
